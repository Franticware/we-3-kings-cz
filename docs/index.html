<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub README Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #24292e;
        }
        #content {
            border: 1px solid #d1d5da;
            padding: 30px;
            border-radius: 6px;
            background-color: #fff;
        }
        pre {
            background-color: #f6f8fa;
            padding: 16px;
            overflow: auto;
            border-radius: 3px;
        }
        code {
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="content">Loading content...</div>

    <script>
        // The URL must point to the "raw" version of the file
        const rawUrl = 'https://raw.githubusercontent.com/Franticware/we-3-kings-cz/main/README.md';

        async function fetchReadme() {
            const container = document.getElementById('content');

            try {
                const response = await fetch(rawUrl);

                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.statusText}`);
                }

                const markdownText = await response.text();

                // Use Marked.js to convert Markdown string to HTML
                container.innerHTML = marked.parse(markdownText);
            } catch (error) {
                container.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        fetchReadme();
    </script>
</body>
</html>
